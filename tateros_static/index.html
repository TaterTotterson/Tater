<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaterOS</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <div id="app-shell" class="app-shell">
      <aside class="sidebar" id="app-sidebar">
        <div class="sidebar-controls">
          <button id="sidebar-collapse-btn" class="inline-btn sidebar-toggle-btn" type="button" aria-label="Hide menu">
            ✕
          </button>
        </div>
        <div class="brand-wrap">
          <div class="brand-dot"></div>
          <div>
            <h1 id="brand-name">Tater</h1>
            <p id="brand-subtitle">TaterOS Control Surface</p>
          </div>
        </div>

        <nav class="nav-stack" aria-label="Primary">
          <button class="nav-btn active" data-view="chat">Chat</button>
          <button class="nav-btn" data-view="verbas">Verba</button>
          <button class="nav-btn" data-view="portals">Portals</button>
          <button class="nav-btn" data-view="cores">Cores</button>
          <button class="nav-btn" data-view="settings">Settings</button>
        </nav>
      </aside>

      <main class="main-pane">
        <header class="topbar">
          <div>
            <h2 id="view-title">Chat</h2>
            <p id="view-subtitle">Talk to Verba tools through Cerberus.</p>
          </div>
          <div id="runtime-summary" class="runtime-summary"></div>
        </header>

        <section id="view-root" class="view-root"></section>
      </main>
    </div>

    <button id="sidebar-expand-btn" class="sidebar-expand-fab" type="button" aria-label="Show menu" title="Show menu">
      ☰
    </button>

    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

    <script src="./static/app.js" defer></script>
  </body>
</html>

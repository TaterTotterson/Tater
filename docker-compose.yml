services:
  tater:
    build:
      context: .
    container_name: tater_app
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      UMASK: ${UMASK:-022}
    volumes:
      - ${TATER_AGENT_LAB_PATH:-./agent_lab}:/app/agent_lab
      - ${TATER_RUNTIME_PATH:-./.runtime}:/app/.runtime
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

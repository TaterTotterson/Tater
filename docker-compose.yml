services:
  tater:
    build:
      context: .
    container_name: tater_app
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-America/Chicago}
      HTMLUI_HOST: ${HTMLUI_HOST:-0.0.0.0}
      HTMLUI_PORT: ${HTMLUI_PORT:-8501}
      TATER_REDIS_CONFIG_PATH: ${TATER_REDIS_CONFIG_PATH:-/app/.runtime/redis_connection.json}
      AUTOMATIC_URL: ${AUTOMATIC_URL:-}
      PREMIUMIZE_API_KEY: ${PREMIUMIZE_API_KEY:-}
      LLM_HOST: ${LLM_HOST:-}
      LLM_PORT: ${LLM_PORT:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_EMB_MODEL: ${LLM_EMB_MODEL:-}
    volumes:
      - ${TATER_AGENT_LAB_PATH:-./agent_lab}:/app/agent_lab
      - ${TATER_RUNTIME_PATH:-./.runtime}:/app/.runtime
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  redis:
    image: redis/redis-stack-server:latest
    container_name: tater_redis
    profiles: ["redis"]
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${TATER_REDIS_DATA_PATH:-./redis_data}:/data

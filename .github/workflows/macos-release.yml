name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: macOS app
    runs-on: [self-hosted, macOS]
    timeout-minutes: 60
    env:
      TATER_CODESIGN_IDENTITY: "${{ vars.TATER_CODESIGN_IDENTITY || 'Developer ID Application: Tater Totterson AI LLC (8BHV7Y2D9D)' }}"
      TATER_NOTARIZE: "${{ vars.TATER_NOTARIZE || '0' }}"
      TATER_NOTARY_PROFILE: "${{ vars.TATER_NOTARY_PROFILE || 'tater-notary' }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macos/Tater/Resources/Info.plist)"
          expected_tag="v${version#v}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match macOS app version ${expected_tag}." >&2
            exit 1
          fi

      - name: Build updater package
        shell: bash
        run: macos/Tater/scripts/package_update.sh

      - name: Build installer DMG
        shell: bash
        run: macos/Tater/scripts/build_dmg.sh

      - name: Collect artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macos/Tater/Resources/Info.plist)"
          version_token="${version#v}"
          version_label="v${version_token}"
          zip_path="macos/Tater/releases/Tater-${version_label}.zip"
          dmg_path="macos/Tater/releases/Tater-${version_label}.dmg"
          test -f "${zip_path}"
          test -f "${dmg_path}"
          echo "version_label=${version_label}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"
          echo "dmg_path=${dmg_path}" >> "${GITHUB_OUTPUT}"
          echo "manifest_path=macos/Tater/update-manifest.json" >> "${GITHUB_OUTPUT}"
          shasum -a 256 "${zip_path}" "${dmg_path}" "macos/Tater/update-manifest.json"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tater-macOS-${{ steps.meta.outputs.version_label }}
          if-no-files-found: error
          path: |
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.dmg_path }}
            ${{ steps.meta.outputs.manifest_path }}

      - name: Commit updater files to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Tag commit is not current origin/main; skipping generated release commit." >&2
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "${{ steps.meta.outputs.zip_path }}" \
            "${{ steps.meta.outputs.dmg_path }}" \
            "${{ steps.meta.outputs.manifest_path }}"
          if git diff --cached --quiet; then
            echo "No generated release changes to commit."
            exit 0
          fi
          git commit -m "Add macOS release ${{ steps.meta.outputs.version_label }}"
          git push origin HEAD:main

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          VERSION_LABEL: ${{ steps.meta.outputs.version_label }}
          ZIP_PATH: ${{ steps.meta.outputs.zip_path }}
          DMG_PATH: ${{ steps.meta.outputs.dmg_path }}
          MANIFEST_PATH: ${{ steps.meta.outputs.manifest_path }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="${GITHUB_REF_NAME}"
          release_id="$(gh api "repos/${repo}/releases/tags/${tag}" --jq '.id' 2>/dev/null || true)"
          if [[ -z "${release_id}" ]]; then
            release_id="$(gh api \
              --method POST \
              "repos/${repo}/releases" \
              -f "tag_name=${tag}" \
              -f "name=Tater ${VERSION_LABEL}" \
              -F "prerelease=true" \
              -F "generate_release_notes=true" \
              --jq '.id')"
          fi

          upload_asset() {
            local path="$1"
            local content_type="$2"
            local name
            local existing_id
            name="$(basename "${path}")"
            existing_id="$(gh api "repos/${repo}/releases/${release_id}/assets" \
              --jq ".[] | select(.name == \"${name}\") | .id" 2>/dev/null || true)"
            if [[ -n "${existing_id}" ]]; then
              gh api --method DELETE "repos/${repo}/releases/assets/${existing_id}" >/dev/null
            fi
            gh api \
              --method POST \
              -H "Content-Type: ${content_type}" \
              --input "${path}" \
              "https://uploads.github.com/repos/${repo}/releases/${release_id}/assets?name=${name}" \
              --jq '"uploaded " + .name'
          }

          upload_asset "${ZIP_PATH}" "application/zip"
          upload_asset "${DMG_PATH}" "application/x-apple-diskimage"
          upload_asset "${MANIFEST_PATH}" "application/json"

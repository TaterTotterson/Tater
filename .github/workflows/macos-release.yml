name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: macOS app
    runs-on: [self-hosted, macOS]
    timeout-minutes: 60
    env:
      TATER_CODESIGN_IDENTITY: "${{ vars.TATER_CODESIGN_IDENTITY || 'Developer ID Application: Tater Totterson AI LLC (8BHV7Y2D9D)' }}"
      TATER_NOTARIZE: "${{ vars.TATER_NOTARIZE || '0' }}"
      TATER_NOTARY_PROFILE: "${{ vars.TATER_NOTARY_PROFILE || 'tater-notary' }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macos/Tater/Resources/Info.plist)"
          expected_tag="v${version#v}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match macOS app version ${expected_tag}." >&2
            exit 1
          fi

      - name: Build updater package
        shell: bash
        run: macos/Tater/scripts/package_update.sh

      - name: Build installer DMG
        shell: bash
        run: macos/Tater/scripts/build_dmg.sh

      - name: Collect artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macos/Tater/Resources/Info.plist)"
          version_token="${version#v}"
          version_label="v${version_token}"
          zip_path="macos/Tater/releases/Tater-${version_label}.zip"
          dmg_path="macos/Tater/releases/Tater-${version_label}.dmg"
          test -f "${zip_path}"
          test -f "${dmg_path}"
          echo "version_label=${version_label}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"
          echo "dmg_path=${dmg_path}" >> "${GITHUB_OUTPUT}"
          echo "manifest_path=macos/Tater/update-manifest.json" >> "${GITHUB_OUTPUT}"
          shasum -a 256 "${zip_path}" "${dmg_path}" "macos/Tater/update-manifest.json"

      - name: Upload workflow artifacts
        if: ${{ vars.TATER_UPLOAD_WORKFLOW_ARTIFACTS == '1' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Tater-macOS-${{ steps.meta.outputs.version_label }}
          if-no-files-found: error
          compression-level: 0
          path: |
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.dmg_path }}
            ${{ steps.meta.outputs.manifest_path }}

      - name: Commit updater files to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Tag commit is not current origin/main; skipping generated release commit." >&2
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "${{ steps.meta.outputs.zip_path }}" \
            "${{ steps.meta.outputs.dmg_path }}" \
            "${{ steps.meta.outputs.manifest_path }}"
          if git diff --cached --quiet; then
            echo "No generated release changes to commit."
            exit 0
          fi
          git commit -m "Add macOS release ${{ steps.meta.outputs.version_label }}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Generated release commit push failed on attempt ${attempt}; retrying..." >&2
            sleep 10
          done
          echo "::warning::Generated release files were built, but pushing them to main timed out. Continuing so GitHub Release assets can publish."

      - name: Ensure GitHub CLI
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            exit 0
          fi
          for candidate in /opt/homebrew/bin/gh /usr/local/bin/gh; do
            if [[ -x "${candidate}" ]]; then
              echo "$(dirname "${candidate}")" >> "${GITHUB_PATH}"
              exit 0
            fi
          done
          if command -v brew >/dev/null 2>&1; then
            brew install gh
            echo "$(brew --prefix)/bin" >> "${GITHUB_PATH}"
            exit 0
          fi
          echo "GitHub CLI (gh) is required to publish release assets." >&2
          exit 1

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          VERSION_LABEL: ${{ steps.meta.outputs.version_label }}
          ZIP_PATH: ${{ steps.meta.outputs.zip_path }}
          DMG_PATH: ${{ steps.meta.outputs.dmg_path }}
          MANIFEST_PATH: ${{ steps.meta.outputs.manifest_path }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            gh release create "${tag}" \
              --repo "${repo}" \
              --title "Tater ${VERSION_LABEL}" \
              --prerelease \
              --generate-notes
          fi
          gh release upload "${tag}" \
            "${ZIP_PATH}" \
            "${DMG_PATH}" \
            "${MANIFEST_PATH}" \
            --repo "${repo}" \
            --clobber
